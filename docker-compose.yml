name: skillforge

services:
  db:
    image: postgres:16-alpine
    container_name: skillforge-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillforge_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-skillforge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - skillforge_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: skillforge-api
    env_file:
      - .env
    environment:
      # When running in compose, connect via service name `db`
      DATABASE_URL: postgresql://${POSTGRES_USER:-skillforge}:${POSTGRES_PASSWORD:-skillforge_dev_password}@db:5432/${POSTGRES_DB:-skillforge}?schema=public
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3100}
      API_PORT: ${API_PORT:-3200}
    ports:
      - "${API_PORT:-3200}:3200"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: skillforge-web
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3200}
    ports:
      - "${WEB_PORT:-3100}:3100"
    depends_on:
      - api

volumes:
  skillforge_db:
